services:
  - type: web
    name: compiler-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DEBUG
        value: False
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-name.onrender.com

  - type: web
    name: compiler-frontend
    runtime: static
    buildCommand: ""
    staticPublishPath: frontend