version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pycompile-backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=False
      - ALLOWED_ORIGINS=*
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:alpine
    container_name: pycompile-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
